<div class="w-full my-3">
  <div class="flex flex-col gap-3">
    <input type="file" #file placeholder="Choose file" (change)="uploadFile(file.files)" class="hidden" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt">
    <button type="button" class="upload-btn" (click)="file.click()" [disabled]="isUploading">
      <i class="fas fa-cloud-upload-alt"></i>
      <span>انتخاب فایل</span>
    </button>

    <div class="flex items-center gap-3" *ngIf="progress > 0 && isUploading">
      <div class="flex-1 h-1.5 bg-[#e5e7eb] rounded-full overflow-hidden">
        <div class="h-full bg-[#004532] transition-all duration-300 rounded-full" [style.width.%]="progress"></div>
      </div>
      <span class="min-w-[40px] text-xs font-semibold text-[#004532]">{{ progress }}%</span>
    </div>

    <div class="flex items-center gap-2.5 px-4 py-3 bg-[#ecfdf5] border border-[#a7f3d0] rounded-lg text-[#065f46] font-medium text-xs" *ngIf="message && !isUploading">
      <i class="fas fa-check-circle text-[#059669]"></i>
      <span>{{ message }}</span>
    </div>

    <div class="flex items-center justify-between px-4 py-3 bg-[#f7f9fb] border border-[#eceef0] rounded-lg hover:bg-white hover:shadow-sm transition-all duration-200" *ngIf="uploadedFilePath && !isUploading">
      <div class="flex items-center gap-3 flex-1">
        <i [class]="'fas text-lg text-[#004532] ' + getFileIcon(uploadedFileName)"></i>
        <div class="flex flex-col gap-0.5">
          <p class="text-xs font-semibold text-[#1a2332] break-words">{{ uploadedFileName }}</p>
          <p class="text-[10px] text-[#6f7973]">{{ getFileTypeLabel(uploadedFileName) }}</p>
        </div>
      </div>
      <div class="flex gap-1.5">
        <button type="button" class="file-action-btn view" (click)="viewFile()" title="مشاهده">
          <i class="fas fa-eye"></i>
        </button>
        <button type="button" class="file-action-btn download" (click)="downloadFile()" title="دانلود">
          <i class="fas fa-download"></i>
        </button>
        <button type="button" class="file-action-btn delete" (click)="deleteFile()" title="حذف">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>
  </div>
</div>
