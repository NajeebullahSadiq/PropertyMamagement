<div class="space-y-5">
  <form [formGroup]="companyForm" (ngSubmit)="companyForm.valid ? selectedId ? updateCompanyDetails() : addCompanyDetails() : null">
    <input type="hidden" formControlName="id">

    <!-- Office Information & Document Upload Card -->
    <div class="bg-white rounded-xl border border-[#eceef0] overflow-hidden mb-5">
      <div class="px-5 py-3.5 border-b border-[#eceef0] flex items-center gap-2.5">
        <div class="w-7 h-7 rounded-lg bg-[#004532] flex items-center justify-center">
          <i class="fas fa-building text-white text-[10px]"></i>
        </div>
        <h3 class="text-base font-extrabold text-[#1a2332]">معلومات دفتر</h3>
      </div>
      <div class="px-5 py-5">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label for="title" class="block text-xs font-semibold text-[#4a5568] mb-1.5">عنوان رهنمایی معاملات <span class="text-red-500">*</span></label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-[#9ca3af]"><i class="fas fa-file-alt text-xs"></i></span>
              <input type="text" id="title" formControlName="title" class="form-input pl-9" placeholder="عنوان دفتر را وارد کنید">
            </div>
            <div *ngIf="title?.invalid && (title?.dirty || title?.touched)">
              <small class="text-red-500 text-[11px] mt-1 block" *ngIf="title?.errors?.['required']">این فیلد الزامی است</small>
            </div>
          </div>
          <div>
            <label for="tin" class="block text-xs font-semibold text-[#4a5568] mb-1.5">نمبر تشخصیه مالیه دهی <span class="text-red-500">*</span></label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-[#9ca3af]"><i class="fas fa-sort-numeric-down text-xs"></i></span>
              <input type="text" id="tin" formControlName="tin" class="form-input pl-9" placeholder="نمبر TIN را وارد کنید">
            </div>
            <div *ngIf="tin?.invalid && (tin?.dirty || tin?.touched)">
              <small class="text-red-500 text-[11px] mt-1 block" *ngIf="tin?.errors?.['required']">این فیلد الزامی است</small>
            </div>
          </div>
        </div>
        <!-- Document Upload -->
        <div class="mt-5 pt-5 border-t border-[#eceef0]">
          <div class="flex items-center gap-2 mb-3">
            <div class="w-6 h-6 rounded-lg bg-[#6366f1] flex items-center justify-center"><i class="fas fa-cloud-upload-alt text-white text-[9px]"></i></div>
            <h4 class="text-xs font-bold text-[#1a2332]">آپلود اسنادها در سیستم</h4>
          </div>
          <div class="bg-[#f9fafb] p-4 rounded-lg border border-[#eceef0]">
            <app-fileupload #childComponent
              [existingFilePath]="companyForm.get('docPath')?.value"
              documentType="company"
              acceptTypes="image/*,.pdf,.doc,.docx"
              (sendMessage)="uploadFinished($event)">
            </app-fileupload>
          </div>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex gap-3 justify-center pb-4">
      <button type="submit" [disabled]="companyForm.invalid" class="btn-primary">
        <i class="fas" [ngClass]="selectedId ? 'fa-edit' : 'fa-save'"></i>
        <span>{{selectedId ? 'تغیر معلومات' : 'ثبت معلومات'}}</span>
      </button>
      <button type="reset" (click)="resetForms()" class="btn-secondary">
        <i class="fas fa-plus-circle"></i>
        <span>جدید</span>
      </button>
    </div>
  </form>
</div>
