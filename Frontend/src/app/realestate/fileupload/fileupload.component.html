<div class="upload-container">
  <div class="upload-area">
    <input type="file" #file placeholder="Choose file" (change)="uploadFile(file.files)" style="display:none;" [accept]="acceptTypes">
    <div class="flex flex-wrap gap-2 items-center">
      <button type="button" class="btn-upload" (click)="file.click()" [disabled]="isUploading">
        <i class="fas fa-upload"></i><span>انتخاب فایل</span>
      </button>
      <button type="button" *ngIf="uploadedFilePath" class="btn-view" (click)="viewFile()">
        <i class="fas fa-eye"></i><span>مشاهده</span>
      </button>
      <button type="button" *ngIf="uploadedFilePath" class="btn-download" (click)="downloadFile()">
        <i class="fas fa-download"></i><span>دانلود</span>
      </button>
      <button type="button" *ngIf="uploadedFilePath" class="btn-delete" (click)="deleteFile()">
        <i class="fas fa-trash"></i><span>حذف</span>
      </button>
    </div>
    <div class="mt-3" *ngIf="progress > 0 || message">
      <div class="flex items-center gap-2">
        <div *ngIf="progress > 0 && progress < 100" class="flex-1">
          <div class="w-full bg-[#e5e7eb] rounded-full h-1.5">
            <div class="bg-[#004532] h-1.5 rounded-full transition-all duration-300" [style.width.%]="progress"></div>
          </div>
          <span class="text-xs text-[#6f7973] mt-1">{{ progress }}%</span>
        </div>
        <span *ngIf="message" class="text-xs" [ngClass]="{'text-[#059669]': !message.includes('خطا'), 'text-red-500': message.includes('خطا')}">
          <i class="fas" [ngClass]="{'fa-check-circle': !message.includes('خطا'), 'fa-exclamation-circle': message.includes('خطا')}"></i>
          {{ message }}
        </span>
      </div>
    </div>
    <div *ngIf="uploadedFilePath && uploadedFileName" class="mt-3 p-3 bg-[#f9fafb] rounded-lg border border-[#eceef0]">
      <div class="flex items-center gap-2">
        <i class="fas text-xl" [ngClass]="getFileIcon(uploadedFileName)"></i>
        <div class="flex-1">
          <p class="text-sm font-medium text-[#1a2332] truncate">{{ uploadedFileName }}</p>
          <p class="text-xs text-[#6f7973]">{{ getFileTypeLabel(uploadedFileName) }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
