<div class="upload-container">
  <div class="upload-section flex items-center gap-3">
    <input type="file" #file placeholder="Choose National ID file" (change)="uploadFile(file.files)" style="display:none;" accept="image/*,.pdf,.doc,.docx">
    <button type="button" class="btn-upload" (click)="file.click()" [disabled]="isUploading">
      <i class="fas fa-id-card"></i> انتخاب تذکره ملی
    </button>
    <span class="upload-status" *ngIf="isUploading">در حال آپلود...</span>
  </div>
  <div class="progress-bar-container" *ngIf="isUploading">
    <div class="progress-bar-fill" [style.width.%]="progress"></div>
  </div>
  <div *ngIf="!isUploading && message" class="mt-2">
    <span class="upload-success"><i class="fas fa-check-circle"></i> {{ message }}</span>
  </div>
  <div *ngIf="existingFilePath && !isUploading" class="mt-3">
    <div class="flex items-center gap-3 flex-wrap">
      <span class="text-xs text-[#6f7973]"><i class="fas fa-file"></i> فایل موجود: {{ existingFilePath }}</span>
      <div class="flex gap-2">
        <button type="button" class="btn-file-action" (click)="viewFile()">
          <i class="fas fa-eye"></i> مشاهده
        </button>
        <button type="button" class="btn-file-action" (click)="downloadFile()">
          <i class="fas fa-download"></i> دانلود
        </button>
        <button type="button" class="btn-file-action !text-[#b91c1c]" (click)="deleteFile()">
          <i class="fas fa-trash"></i> حذف
        </button>
      </div>
    </div>
  </div>
</div>
